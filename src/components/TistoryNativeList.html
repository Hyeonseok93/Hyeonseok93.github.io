<!-- gh-pages-strip-start:tistory-native-list -->
<div id="tistory-native-list" class="tistory-native-list w-full pt-4 scroll-mt-20">
  <header class="category-posts-hero w-full text-center mb-10 px-2 py-10 max-sm:py-8">
    <h2 class="category-posts-hero__title text-[2rem] max-sm:text-[1.55rem] font-bold tracking-tight text-white" data-category-label-source="list">
      [##_list_conform_##]
    </h2>
    <p class="category-posts-hero__desc text-[0.92rem] max-sm:text-[0.85rem] text-textSecondary leading-relaxed mt-3 max-w-[560px] mx-auto">[##_list_description_##]</p>
  </header>

  <div class="category-posts-feed w-full flex flex-col">
    <s_list_rep>
      <article class="category-post-card" data-tistory-list-entry>
        <a href="[##_list_rep_link_##]" class="category-post-card__link">
            <div class="category-post-card__body">
            <h3 class="category-post-card__title">[##_list_rep_title_##]</h3>
            <p class="category-post-card__meta">[##_list_rep_regdate_##] · [##_list_rep_category_##]</p>
            <div class="category-post-card__excerpt" data-tistory-list-excerpt>[##_list_rep_summary_##]</div>
          </div>
          <s_list_rep_thumbnail>
            <div class="category-post-card__thumb">
              <img src="[##_list_rep_thumbnail_url_##]" alt="" loading="lazy" />
            </div>
          </s_list_rep_thumbnail>
        </a>
      </article>
    </s_list_rep>
  </div>

  <s_paging>
    <nav class="pagination tistory-native-pagination flex justify-center gap-2 my-8" aria-label="Post list pagination">
      <a [##_prev_page_##] class="[##_no_more_prev_##] w-9 h-9 flex items-center justify-center rounded-lg border border-white/10 text-gray-400 hover:bg-white/5"><i class="fa-solid fa-chevron-left"></i></a>
      <s_paging_rep>
        <a [##_paging_rep_link_##] class="num w-9 h-9 flex items-center justify-center rounded-lg border border-white/10 text-gray-400 hover:bg-white/5">[##_paging_rep_link_num_##]</a>
      </s_paging_rep>
      <a [##_next_page_##] class="[##_no_more_next_##] w-9 h-9 flex items-center justify-center rounded-lg border border-white/10 text-gray-400 hover:bg-white/5"><i class="fa-solid fa-chevron-right"></i></a>
    </nav>
  </s_paging>
</div>
<!-- gh-pages-strip-end:tistory-native-list -->
