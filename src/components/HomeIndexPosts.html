<article class="post-card-item flex flex-col gap-1 p-3 rounded-lg hover:bg-white/5 transition-all duration-200">
  <span class="post-card-meta text-[0.75rem] text-accentCyan font-medium">[##_article_rep_date_##]</span>
  <h3 class="post-card-title text-[1.05rem] font-semibold text-white hover:text-accentAmber">
    <a href="[##_article_rep_link_##]">[##_article_rep_title_##]</a>
  </h3>
  <s_article_rep_thumbnail>
    <div class="tistory-list-entry__thumb hidden" aria-hidden="true">
      <img src="[##_article_rep_thumbnail_url_##]" alt="" loading="lazy" />
    </div>
  </s_article_rep_thumbnail>
</article>
