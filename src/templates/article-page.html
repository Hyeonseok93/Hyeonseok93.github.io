<!-- Article shell for GitHub Pages / dev (built from Markdown).
     Tistory mirror: src/components/Article.html -->
<div class="article-page w-full" data-pagefind-body>
  <a href="{{categoryLink}}" class="article-back">
    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
    <span>{{categoryLabel}}</span>
  </a>

  <h1 id="article-hero" class="article-title">{{title}}</h1>
  <div class="article-meta">
    <span class="article-meta__item"><i class="fa-regular fa-calendar" aria-hidden="true"></i> {{date}}</span>
    <span class="article-meta__dot" aria-hidden="true">·</span>
    <span class="article-meta__item"><i class="fa-regular fa-user" aria-hidden="true"></i> {{author}}</span>
  </div>

  {{tagsHtml}}

  {{thumbnailHtml}}

  <details class="article-toc" id="article-toc" open>
    <summary class="article-toc__summary">
      <span class="article-toc__heading">목차</span>
      <i class="fa-solid fa-chevron-down article-toc__chevron" aria-hidden="true"></i>
    </summary>
    <div class="article-toc__nav" id="article-toc-nav"></div>
  </details>

  <article class="article-body">
    <div class="article-content">
      {{content}}
    </div>
  </article>

  <nav class="article-post-nav" aria-label="Post navigation">
    {{prevNavHtml}}
    {{nextNavHtml}}
  </nav>
</div>
